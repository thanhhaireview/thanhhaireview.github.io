    <title>Thanh Hải - Bio Link</title>
    <style>
        /* Cài đặt tổng thể trang web */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* Màu nền gradient nhẹ nhàng */
            color: #333;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* Khung chứa nội dung ở giữa màn hình */
        .container {
            max-width: 450px;
            margin: 0 auto;
        }

        /* Chỉnh sửa ảnh đại diện */
        img.profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%; /* Bo tròn ảnh */
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Chữ ký / Tên */
        h1 {
            font-size: 26px;
            margin-top: 20px;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        /* Dòng giới thiệu ngắn (Bio) */
        p.bio {
            font-size: 15px;
            color: #555;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* Thiết kế các nút bấm gắn link */
        .link-btn {
            display: block;
            background-color: #ffffff;
            color: #333;
            text-decoration: none;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease; /* Hiệu ứng chuyển động mượt */
            border: 1px solid #eaeaea;
        }

        /* Hiệu ứng khi di chuột hoặc chạm vào nút */
        .link-btn:hover {
            background-color: #2980b9; /* Đổi sang màu xanh khi chạm */
            color: #ffffff;
            transform: translateY(-3px); /* Nút hơi nổi lên */
            box-shadow: 0 6px 12px rgba(41, 128, 185, 0.3);
        }
    </style>
</head>
